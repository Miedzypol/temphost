<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>temphost</title>
</head>
<body>

    <h1>temphost</h1>
    <p>Upload your files for a day. Important - loosing token means loosing the file.
        The file stays about a day on our servers. Then, it's deleted.
    </p>
    <form id="uploadForm" enctype="multipart/form-data">
        <input type="file" id="fileInput" name="file" required>
        <button type="submit">Upload</button>
    </form>
    <div id="response"></div>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const fileInput = document.getElementById('fileInput');
            const file = fileInput.files[0];
            const maxSize = 150 * 1024 * 1024;
            if (file.size > maxSize) {
                document.getElementById('response').innerText = 'File size exceeds 500MB.';
                return;
            }
            const formData = new FormData();
            formData.append('file', file);

            fetch('/upload', {
                method: 'POST',
                body: formData,
            })
            .then(response => response.text())
            .then(data => {
                document.getElementById('response').innerText = 'Server response: ' + data;
            })
            .catch(error => {
                document.getElementById('response').innerText = 'Error: ' + error;
            });
        });
    </script>
</body>
</html>
